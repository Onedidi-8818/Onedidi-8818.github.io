<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商 - Onedidi</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#fff;overflow-x:hidden}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,#222 0%,#111 70%);animation:bgFloat 16s ease-in-out infinite;opacity:0.4;z-index:-1}
        @keyframes bgFloat{0%,100%{transform:scale(1) translate(0,0)}50%{transform:scale(1.08) translate(1%,-1%)}}
        
        nav{position:fixed;top:0;width:100%;padding:1.2rem 3rem;background:transparent;display:flex;align-items:center;justify-content:space-between;z-index:100}
        .logo-img{height:28px;transition:all 0.3s}
        .logo-img:hover{transform:scale(1.12);filter:brightness(0) saturate(100%) invert(77%) sepia(100%) saturate(500%) hue-rotate(10deg)}
        .nav-menu{display:flex;gap:2.2rem;position:absolute;left:50%;transform:translateX(-50%)}
        .nav-menu a{color:#aaa;font-size:14px;text-decoration:none;transition:all 0.25s}
        .nav-menu a:hover{color:#fff;transform:scale(1.08)}

        /* 大标题 */
        .page-title{max-width:1000px;margin:140px auto 30px;padding:0 2rem;font-size:28px;font-weight:500}
        
        /* 瀑布流 */
        .container{max-width:1000px;margin:0 auto 60px;padding:0 2rem;columns:2;gap:1.6rem}
        .item{break-inside:avoid;margin-bottom:2.4rem}
        .card{width:100%;height:280px;background:#333;border-radius:18px;margin-bottom:12px}
        .item-title{font-size:15px;color:#ccc;text-align:center}

        @media(max-width:768px){.container{columns:1}}
    </style>
</head>
<body>
    <nav>
        <a href="index.html"><img src="logo.png" class="logo-img"></a>
        <div class="nav-menu">
            <a href="ecommerce.html">电商</a>
            <a href="ai.html">AI</a>
            <a href="design.html">平面</a>
        </div>
    </nav>

    <h1 class="page-title">电商</h1>

    <div class="container">
        <div class="item"><div class="card"></div><div class="item-title">标题1</div></div>
        <div class="item"><div class="card"></div><div class="item-title">标题2</div></div>
        <div class="item"><div class="card"></div><div class="item-title">标题3</div></div>
        <div class="item"><div class="card"></div><div class="item-title">标题4</div></div>
        <div class="item"><div class="card"></div><div class="item-title">标题5</div></div>
        <div class="item"><div class="card"></div><div class="item-title">标题6</div></div>
    </div>
</body>
</html>
