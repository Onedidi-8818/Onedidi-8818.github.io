<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onedidi</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon-32x32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="apple-icon-180x180.png">
    <link rel="icon" href="android-icon-192x192.png" sizes="192x192" type="image/png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111;
            color: #fff;
            overflow-x: hidden;
        }

        /* 开场动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            animation: hideLoader 0.01s 2.4s forwards;
        }

        @keyframes hideLoader {
            to { opacity: 0; visibility: hidden; }
        }

        .shape {
            width: 46px;
            height: 46px;
            background: #000;
            border-radius: 50%;
            animation: shapeAnim 2.4s cubic-bezier(0.25,1,0.5,1) forwards;
        }

        @keyframes shapeAnim {
            0%   { transform: translateY(-100vh); opacity: 0; border-radius:50%; }
            40%  { transform: translateY(0); opacity:1; }
            50%  { transform: translateY(-6px); }
            58%  { transform: translateY(0); }
            64%  { transform: scaleY(0.15) scaleX(1.5); }
            70%  { transform: scaleY(0.008) scaleX(30); }
            80%  { transform: scaleY(0.006) scaleX(150); }
            100% { transform: scaleY(0.006) scaleX(400); opacity:0; }
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.2rem 3rem;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        /* LOGO */
        .logo-img {
            height: 28px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .logo-img:hover {
            transform: scale(1.12);
            filter: brightness(0) saturate(100%) invert(77%) sepia(100%) saturate(500%) hue-rotate(10deg);
        }

        /* 导航菜单 */
        .nav-menu {
            display: flex;
            gap: 2.2rem;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-menu a {
            color: #aaa;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .nav-menu a:hover {
            color: #fff;
            transform: scale(1.08);
        }

        /* 满屏 Banner */
        .banner {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 2rem;
        }

        .banner-text {
            opacity: 0;
            transform: translateY(20px);
            animation: textAnim 0.9s 2.0s forwards;
        }

        @keyframes textAnim {
            to { opacity:1; transform:translateY(0); }
        }

        .banner-text h1 {
            font-size: 3.2rem;
            margin-bottom: 1rem;
        }

        .banner-text p {
            color: #aaa;
            font-size: 1rem;
        }

        /* 响应式 */
        @media (max-width:768px) {
            nav { padding: 1rem 1.5rem; }
            .nav-menu { gap:1.2rem; }
            .nav-menu a { font-size:13px; }
            .banner-text h1 { font-size:2.2rem; }
        }
    </style>
</head>

<body>

    <!-- 开场动画 -->
    <div class="loader">
        <div class="shape"></div>
    </div>

    <!-- 导航 -->
    <nav>
        <a href="index.html">
            <img src="logo.png" class="logo-img" alt="Onedidi">
        </a>
        <div class="nav-menu">
            <a href="ecommerce.html">电商</a>
            <a href="ai.html">AI</a>
            <a href="design.html">平面</a>
        </div>
    </nav>

    <!-- 满屏 Banner（首页唯一内容）-->
    <section class="banner">
        <div class="banner-text">
            <h1>Onedidi · 设计作品集</h1>
            <p>视觉设计 / 品牌创意 / 视觉美学研究</p>
        </div>
    </section>

</body>
</html>
